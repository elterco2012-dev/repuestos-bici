<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>Cartel A4 - Repuestos de Bici Jorge</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet" />

<style>
@page {
  size: A4;
  margin: 0;
}

body {
  margin: 0;
  font-family: 'Nunito', sans-serif;
  background: #fff;
}

/* CONTENEDOR A4 */
.a4 {
  width: 210mm;
  height: 297mm;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* CARTEL */
.cartel {
  width: 180mm;
  padding: 20mm;
  border: 2px solid #e2e8f0;
  border-radius: 20px;
  text-align: center;
}

.cartel-titulo {
  font-size: 14px;
  font-weight: 800;
  letter-spacing: 2px;
  color: #64748b;
  margin-bottom: 8px;
}

h1 {
  font-size: 32px;
  font-weight: 900;
  margin-bottom: 25px;
}
h1 span { color: #16a34a; }

/* PASOS */
.pasos {
  text-align: left;
  margin-bottom: 25px;
}

.paso {
  display: flex;
  gap: 12px;
  margin-bottom: 12px;
}

.paso-num {
  font-size: 24px;
}

.paso-texto h3 {
  font-size: 16px;
  font-weight: 800;
}

.paso-texto p {
  font-size: 13px;
  color: #64748b;
}

/* QR */
.qr-wrapper {
  border: 3px solid #16a34a;
  border-radius: 20px;
  padding: 15px;
  margin: 20px auto;
  width: fit-content;
}

.qr-label {
  font-size: 13px;
  font-weight: 800;
  color: #16a34a;
  margin-bottom: 10px;
}

.qr-img {
  width: 260px;
  height: 260px;
}

/* WhatsApp */
.wa {
  margin-top: 10px;
  font-size: 20px;
  font-weight: 900;
  color: #25D366;
}

</style>
</head>

<body>

<div class="a4">
  <div class="cartel">

    <div class="cartel-titulo">REPUESTOS DE BICI JORGE</div>

    <h1>¿Cómo <span>funciona</span>?</h1>

    <div class="pasos">
      <div class="paso">
        <div class="paso-num">📷</div>
        <div class="paso-texto">
          <h3>Escaneá el QR</h3>
          <p>Abrí la cámara del celular y apuntá al código.</p>
        </div>
      </div>

      <div class="paso">
        <div class="paso-num">🔧</div>
        <div class="paso-texto">
          <h3>Elegí el repuesto</h3>
          <p>Buscá lo que necesitás en el catálogo.</p>
        </div>
      </div>

      <div class="paso">
        <div class="paso-num">💬</div>
        <div class="paso-texto">
          <h3>Consultá por WhatsApp</h3>
          <p>Te respondemos al instante.</p>
        </div>
      </div>
    </div>

    <div class="qr-wrapper">
      <div class="qr-label">ESCANEAME</div>
      <img class="qr-img" src="qr-code.jpg" />
    </div>

    <div class="wa">
      WhatsApp: +54 9 11 5476-7247
    </div>

  </div>
</div>

</body>
</html>
